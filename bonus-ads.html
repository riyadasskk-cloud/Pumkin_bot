<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>বোনাস এড - মিষ্টি কুমড়া বট</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .countdown-overlay { 
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background:rgba(0,0,0,0.95); display:none; justify-content:center; 
            align-items:center; flex-direction:column; z-index:1000; 
        }
        .countdown-number { font-size:80px; font-weight:bold; color:#FF9800; }
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            z-index: 1001;
            display: none;
        }
    </style>
</head>
<body>
    <div id="countdownOverlay" class="countdown-overlay">
        <div class="text-center">
            <i class="fas fa-hourglass-half text-white text-5xl mb-4"></i>
            <div id="countdownNumber" class="countdown-number">10</div>
            <p class="text-white">বোনাস এড দেখুন... ১০ সেকেন্ড অপেক্ষা করুন</p>
        </div>
    </div>
    <div id="toast" class="toast"></div>

    <div class="container mx-auto px-4 py-6">
        <div class="pumpkin-header mb-6 text-center bg-gradient-to-r from-yellow-500 to-orange-500">
            <h1 class="text-2xl font-bold">⭐ বোনাস এড</h1>
            <p class="text-white/80">প্রতি এডে ১০ টাকা | রিসেট: প্রতি ঘন্টায়</p>
        </div>

        <div class="pumpkin-card text-center mb-6">
            <div class="text-5xl font-bold text-yellow-600 mb-2">
                <span id="bonusCounter">0</span>/10
            </div>
            <div class="progress-bar mb-4">
                <div class="progress-fill" id="bonusProgressFill" style="width:0%"></div>
            </div>
            <p class="text-gray-600">এই ঘন্টায় দেখেছেন: <span id="bonusToday">0</span> টি বোনাস এড</p>
            <p class="text-xs text-orange-600 font-bold mt-1" id="hourlyResetTimer">পরবর্তী রিসেট: গণনা করা হচ্ছে...</p>
        </div>

        <div class="pumpkin-card text-center">
            <button onclick="watchBonusAd()" id="watchBtn" class="pumpkin-btn bg-gradient-to-r from-yellow-500 to-orange-500 w-full py-4 text-lg">
                ⭐ বোনাস এড দেখুন
            </button>
        </div>
        <a href="tasks.html" class="block text-center text-gray-500 mt-6">← টাস্ক পেজে ফিরুন</a>
    </div>

    <div class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i><span>হোম</span></a>
        <a href="tasks.html" class="nav-item active"><i class="fas fa-tasks"></i><span>টাস্ক</span></a>
        <a href="withdraw.html" class="nav-item"><i class="fas fa-wallet"></i><span>উইথড্র</span></a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user"></i><span>প্রোফাইল</span></a>
    </div>

    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabase = supabase.createClient(window.CONFIG.SUPABASE_URL, window.CONFIG.SUPABASE_ANON_KEY);
        let currentUser = null;
        let countdownInterval = null;
        let isProcessing = false;

        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.backgroundColor = isError ? '#dc2626' : '#22c55e';
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }

        // Check and reset hourly using localStorage for bonus ads
        function checkHourlyBonusReset() {
            const currentHour = new Date().getHours();
            const lastResetHour = localStorage.getItem('last_bonus_reset_hour');
            
            if (lastResetHour !== null && parseInt(lastResetHour) !== currentHour) {
                console.log('Hourly reset for BONUS ADS!');
                localStorage.setItem('hourly_bonus_ads_watched', '0');
                localStorage.setItem('last_bonus_reset_hour', currentHour.toString());
                return true;
            }
            
            if (lastResetHour === null) {
                localStorage.setItem('last_bonus_reset_hour', currentHour.toString());
                localStorage.setItem('hourly_bonus_ads_watched', '0');
            }
            
            return false;
        }

        function getHourlyBonusCount() {
            checkHourlyBonusReset();
            return parseInt(localStorage.getItem('hourly_bonus_ads_watched') || '0');
        }

        function incrementHourlyBonusCount() {
            const current = getHourlyBonusCount();
            const newCount = current + 1;
            localStorage.setItem('hourly_bonus_ads_watched', newCount.toString());
            return newCount;
        }

        function getTimeUntilNextHour() {
            const now = new Date();
            const nextHour = new Date(now);
            nextHour.setHours(now.getHours() + 1, 0, 0, 0);
            const diffMs = nextHour - now;
            const minutes = Math.floor(diffMs / (1000 * 60));
            return `${minutes} মিনিট`;
        }

        async function getOrCreateUser() {
            const tg = window.Telegram?.WebApp;
            let userId = tg?.initDataUnsafe?.user?.id?.toString() || localStorage.getItem('temp_user_id');
            if (!userId) {
                userId = 'web_' + Date.now() + '_' + Math.floor(Math.random() * 10000);
                localStorage.setItem('temp_user_id', userId);
            }
            const firstName = tg?.initDataUnsafe?.user?.first_name || 'ইউজার';
            
            let { data: user, error } = await supabase.from('users').select('*').eq('id', userId).maybeSingle();
            const now = new Date();
            
            if (user) {
                currentUser = user;
            } else {
                const newUser = {
                    id: userId, first_name: firstName, balance: 50, today_ads: 0, total_ads: 0,
                    today_bonus_ads: 0, today_bonus_ads_2: 0, total_referrals: 0, total_income: 50,
                    join_date: now.toISOString(), last_active: now.toISOString()
                };
                const { data: created } = await supabase.from('users').insert(newUser).select().single();
                currentUser = created;
            }
            updateBonusUI();
            return currentUser;
        }

        function updateBonusUI() {
            if (!currentUser) return;
            
            const hourlyCount = getHourlyBonusCount();
            document.getElementById('bonusCounter').textContent = `${hourlyCount}/10`;
            document.getElementById('bonusToday').textContent = hourlyCount;
            document.getElementById('bonusProgressFill').style.width = `${(hourlyCount / 10) * 100}%`;
            document.getElementById('hourlyResetTimer').textContent = `পরবর্তী রিসেট: ${getTimeUntilNextHour()}`;
            
            const watchBtn = document.getElementById('watchBtn');
            if (hourlyCount >= 10) {
                watchBtn.disabled = true;
                watchBtn.innerHTML = '❌ এই ঘন্টায় লিমিট শেষ';
                watchBtn.classList.add('bg-gray-400');
                watchBtn.classList.remove('from-yellow-500', 'to-orange-500');
            } else {
                watchBtn.disabled = false;
                watchBtn.innerHTML = '⭐ বোনাস এড দেখুন';
                watchBtn.classList.remove('bg-gray-400');
                watchBtn.classList.add('bg-gradient-to-r', 'from-yellow-500', 'to-orange-500');
            }
        }

        async function watchBonusAd() {
            if (isProcessing) return;
            if (!currentUser) await getOrCreateUser();
            
            const hourlyCount = getHourlyBonusCount();
            if (hourlyCount >= 10) {
                showToast(`এই ঘন্টায় বোনাস এড লিমিট শেষ! ${getTimeUntilNextHour()} পর আবার চেষ্টা করুন।`, true);
                return;
            }
            
            isProcessing = true;
            const watchBtn = document.getElementById('watchBtn');
            watchBtn.disabled = true;
            watchBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> খোলা হচ্ছে...';
            
            const randomLink = window.CONFIG.AD_LINKS[Math.floor(Math.random() * window.CONFIG.AD_LINKS.length)];
            window.open(randomLink, '_blank');
            
            document.getElementById('countdownOverlay').style.display = 'flex';
            let seconds = 10;
            document.getElementById('countdownNumber').textContent = seconds;
            countdownInterval = setInterval(() => {
                seconds--;
                document.getElementById('countdownNumber').textContent = seconds;
                if (seconds <= 0) { clearInterval(countdownInterval); finishBonusAd(); }
            }, 1000);
        }

        async function finishBonusAd() {
            document.getElementById('countdownOverlay').style.display = 'none';
            
            const newHourlyCount = incrementHourlyBonusCount();
            const newBalance = (currentUser.balance || 0) + 10;
            const newTotalIncome = (currentUser.total_income || 0) + 10;
            
            const { error } = await supabase.from('users').update({
                balance: newBalance,
                total_income: newTotalIncome,
                last_active: new Date().toISOString()
            }).eq('id', currentUser.id);
            
            if (error) { 
                showToast('সমস্যা হয়েছে!', true); 
            } else {
                const { data: fresh } = await supabase.from('users').select('*').eq('id', currentUser.id).single();
                currentUser = fresh;
                updateBonusUI();
                showToast(`✅ ১০ টাকা বোনাস যোগ হয়েছে! এই ঘন্টায় ${newHourlyCount}/10`, false);
            }
            
            isProcessing = false;
            if (getHourlyBonusCount() < 10) {
                document.getElementById('watchBtn').disabled = false;
                document.getElementById('watchBtn').innerHTML = '⭐ বোনাস এড দেখুন';
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            if (window.Telegram?.WebApp) { window.Telegram.WebApp.expand(); window.Telegram.WebApp.ready(); }
            await getOrCreateUser();
            setInterval(() => { 
                checkHourlyBonusReset();
                updateBonusUI(); 
            }, 60000);
        });
        window.watchBonusAd = watchBonusAd;
    </script>
</body>
</html>
