<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>বোনাস এড - মিষ্টি কুমড়া বট</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .countdown-overlay { 
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background:rgba(0,0,0,0.95); display:none; justify-content:center; 
            align-items:center; flex-direction:column; z-index:1000; 
        }
        .countdown-number { font-size:80px; font-weight:bold; color:#FF9800; }
    </style>
</head>
<body>
    <div id="countdownOverlay" class="countdown-overlay">
        <div class="text-center">
            <i class="fas fa-hourglass-half text-white text-5xl mb-4"></i>
            <div id="countdownNumber" class="countdown-number">10</div>
            <p class="text-white">বোনাস এড দেখুন... ১০ সেকেন্ড অপেক্ষা করুন</p>
            <p class="text-gray-400 text-sm mt-2">এড দেখার পর এই পেজে ফিরে আসুন</p>
        </div>
    </div>

    <div class="container mx-auto px-4 py-6">
        <div class="pumpkin-header mb-6 text-center bg-gradient-to-r from-yellow-500 to-orange-500">
            <h1 class="text-2xl font-bold">⭐ বোনাস এড</h1>
            <p class="text-white/80">প্রতি এডে ১০ টাকা | রিসেট: প্রতি ঘন্টায়</p>
        </div>

        <div class="pumpkin-card text-center mb-6">
            <div class="text-5xl font-bold text-yellow-600 mb-2">
                <span id="bonusCounter">0</span><span>/10</span>
            </div>
            <div class="progress-bar mb-4">
                <div class="progress-fill" id="bonusProgressFill" style="width:0%"></div>
            </div>
            <p class="text-gray-600">এই ঘন্টায় দেখেছেন: <span id="bonusToday">0</span> টি বোনাস এড</p>
            <p class="text-green-600 font-bold mt-2">প্রতি বোনাস এডে ১০ টাকা</p>
            <p class="text-xs text-orange-600 mt-1" id="resetTimer">পরবর্তী রিসেট: গণনা করা হচ্ছে...</p>
        </div>

        <div class="pumpkin-card text-center">
            <button onclick="watchBonusAd()" id="watchBtn" class="pumpkin-btn bg-gradient-to-r from-yellow-500 to-orange-500">
                ⭐ বোনাস এড দেখুন
            </button>
        </div>

        <a href="tasks.html" class="block text-center text-gray-500 mt-6">← টাস্ক পেজে ফিরুন</a>
    </div>

    <div class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i><span>হোম</span></a>
        <a href="tasks.html" class="nav-item active"><i class="fas fa-tasks"></i><span>টাস্ক</span></a>
        <a href="withdraw.html" class="nav-item"><i class="fas fa-wallet"></i><span>উইথড্র</span></a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user"></i><span>প্রোফাইল</span></a>
    </div>

    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>
    <script src="app.js"></script>
    
    <script>
        let countdownInterval;
        let bonusAdOpened = false;

        function checkHourlyBonusReset() {
            const currentHour = new Date().getHours();
            const lastResetHour = localStorage.getItem('last_bonus_reset_hour');
            
            if (lastResetHour !== null && parseInt(lastResetHour) !== currentHour) {
                console.log('Hourly reset for BONUS ADS!');
                localStorage.setItem('hourly_bonus_ads_watched', '0');
                localStorage.setItem('last_bonus_reset_hour', currentHour.toString());
                return true;
            }
            
            if (lastResetHour === null) {
                localStorage.setItem('last_bonus_reset_hour', currentHour.toString());
                localStorage.setItem('hourly_bonus_ads_watched', '0');
            }
            return false;
        }

        function getHourlyBonusCount() {
            checkHourlyBonusReset();
            return parseInt(localStorage.getItem('hourly_bonus_ads_watched') || '0');
        }

        function incrementHourlyBonusCount() {
            const current = getHourlyBonusCount();
            const newCount = current + 1;
            localStorage.setItem('hourly_bonus_ads_watched', newCount.toString());
            return newCount;
        }

        function getTimeUntilNextHour() {
            const now = new Date();
            const nextHour = new Date(now);
            nextHour.setHours(now.getHours() + 1, 0, 0, 0);
            const diffMs = nextHour - now;
            const minutes = Math.floor(diffMs / (1000 * 60));
            return `${minutes} মিনিট`;
        }

        function updateBonusUI() {
            const hourlyCount = getHourlyBonusCount();
            document.getElementById('bonusCounter').textContent = hourlyCount;
            document.getElementById('bonusToday').textContent = hourlyCount;
            document.getElementById('bonusProgressFill').style.width = `${(hourlyCount / 10) * 100}%`;
            document.getElementById('resetTimer').textContent = `পরবর্তী রিসেট: ${getTimeUntilNextHour()}`;
            
            const watchBtn = document.getElementById('watchBtn');
            if (hourlyCount >= 10) {
                watchBtn.disabled = true;
                watchBtn.innerHTML = '❌ এই ঘন্টায় লিমিট শেষ';
                watchBtn.classList.add('bg-gray-400');
            } else {
                watchBtn.disabled = false;
                watchBtn.innerHTML = '⭐ বোনাস এড দেখুন';
                watchBtn.classList.remove('bg-gray-400');
            }
        }

        async function watchBonusAd() {
            const user = await getCurrentUser();
            if (!user) return;
            
            const hourlyCount = getHourlyBonusCount();
            if (hourlyCount >= 10) {
                alert(`❌ এই ঘন্টায় বোনাস এড লিমিট শেষ! ${getTimeUntilNextHour()} পর আবার চেষ্টা করুন।`);
                return;
            }
            
            if (bonusAdOpened) {
                alert('এড ইতিমধ্যে খোলা আছে!');
                return;
            }
            
            const watchBtn = document.getElementById('watchBtn');
            watchBtn.disabled = true;
            watchBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> খোলা হচ্ছে...';
            
            const randomLink = window.CONFIG.AD_LINKS[Math.floor(Math.random() * window.CONFIG.AD_LINKS.length)];
            window.open(randomLink, '_blank');
            bonusAdOpened = true;
            
            document.getElementById('countdownOverlay').style.display = 'flex';
            let seconds = 10;
            const countEl = document.getElementById('countdownNumber');
            countEl.textContent = seconds;
            
            countdownInterval = setInterval(() => {
                seconds--;
                countEl.textContent = seconds;
                if (seconds <= 0) {
                    clearInterval(countdownInterval);
                    finishBonusAd();
                }
            }, 1000);
        }

        async function finishBonusAd() {
            document.getElementById('countdownOverlay').style.display = 'none';
            
            // DO NOT CLOSE THE AD WINDOW
            
            const newHourlyCount = incrementHourlyBonusCount();
            
            const user = await getCurrentUser();
            const newTodayBonusAds = (user.today_bonus_ads || 0) + 1;
            const newBalance = (user.balance || 0) + 10;
            const newTotalIncome = (user.total_income || 0) + 10;
            
            const { error } = await supabase
                .from('users')
                .update({
                    today_bonus_ads: newTodayBonusAds,
                    balance: newBalance,
                    total_income: newTotalIncome,
                    last_active: new Date().toISOString()
                })
                .eq('id', user.id);
            
            if (error) {
                alert('❌ সমস্যা হয়েছে!');
            } else {
                await loadUser();
                alert(`✅ ১০ টাকা বোনাস যোগ হয়েছে! এই ঘন্টায় ${newHourlyCount}/10`);
                location.reload();
            }
            
            document.getElementById('watchBtn').disabled = false;
            document.getElementById('watchBtn').innerHTML = '⭐ বোনাস এড দেখুন';
            bonusAdOpened = false;
        }

        document.addEventListener('DOMContentLoaded', () => {
            updateBonusUI();
            setInterval(updateBonusUI, 60000);
        });
    </script>
</body>
</html>
