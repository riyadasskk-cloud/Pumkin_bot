<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>মিষ্টি কুমড়া বট - হোম</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loadingOverlay" class="fixed inset-0 bg-white z-50 flex items-center justify-center">
        <div class="text-center"><div class="spinner"></div><p>🎃 লোড হচ্ছে...</p></div>
    </div>

    <div class="container mx-auto px-4 py-6">
        <div class="pumpkin-header mb-6">
            <div class="flex justify-between items-center">
                <div><h1 class="text-2xl font-bold">🎃 মিষ্টি কুমড়া</h1><p class="text-white/80 text-sm">আয় করুন সহজে</p></div>
                <i class="fas fa-user-circle text-3xl text-white/80"></i>
            </div>
            <div class="bg-white/10 rounded-xl p-4 mt-4">
                <p class="text-sm">আপনার ব্যালেন্স</p>
                <h2 class="text-3xl font-bold" id="mainBalance">০.০০ টাকা</h2>
                <p class="text-xs mt-2">স্বাগতম, <span id="userName">ইউজার</span></p>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="pumpkin-card text-center"><i class="fas fa-eye text-orange-500 text-2xl mb-2"></i><p class="text-sm">আজকের এড</p><h3 class="font-bold text-xl" id="todayAds">0/10</h3></div>
            <div class="pumpkin-card text-center"><i class="fas fa-users text-orange-500 text-2xl mb-2"></i><p class="text-sm">রেফারেল</p><h3 class="font-bold text-xl" id="totalReferrals">0</h3></div>
            <div class="pumpkin-card text-center"><i class="fas fa-chart-line text-orange-500 text-2xl mb-2"></i><p class="text-sm">মোট এড</p><h3 class="font-bold text-xl" id="totalAds">0</h3></div>
            <div class="pumpkin-card text-center"><i class="fas fa-wallet text-orange-500 text-2xl mb-2"></i><p class="text-sm">মোট আয়</p><h3 class="font-bold text-xl" id="totalIncome">0</h3></div>
        </div>

        <div class="pumpkin-card mb-6">
            <h3 class="font-bold text-lg mb-4">📋 দ্রুত কাজ</h3>
            <div class="space-y-3">
                <a href="tasks.html" class="flex items-center justify-between p-3 bg-orange-50 rounded-xl"><div class="flex items-center"><i class="fas fa-tasks text-orange-500 mr-3"></i><span>টাস্ক করুন</span></div><i class="fas fa-chevron-right"></i></a>
                <a href="withdraw.html" class="flex items-center justify-between p-3 bg-green-50 rounded-xl"><div class="flex items-center"><i class="fas fa-hand-holding-usd text-green-500 mr-3"></i><span>টাকা উত্তোলন</span></div><i class="fas fa-chevron-right"></i></a>
                <button onclick="copyReferralLink()" class="flex items-center justify-between p-3 bg-purple-50 rounded-xl w-full"><div class="flex items-center"><i class="fas fa-link text-purple-500 mr-3"></i><span>রেফারেল লিঙ্ক কপি</span></div><i class="fas fa-copy"></i></button>
            </div>
        </div>

        <div class="pumpkin-card">
            <h3 class="font-bold text-lg mb-3">👥 রেফারেল বোনাস</h3>
            <p class="text-sm text-gray-600 mb-3">প্রতি বন্ধু আনলে পাবেন <span class="font-bold text-green-600">১০০ টাকা</span> | বন্ধু পাবে <span class="font-bold text-green-600">৫০ টাকা</span></p>
            <div class="bg-gray-100 rounded-lg p-3 break-all"><code class="text-xs" id="referralLink">লোড হচ্ছে...</code></div>
            <button onclick="copyReferralLink()" class="mt-3 pumpkin-btn w-full text-sm py-2">📋 কপি লিঙ্ক</button>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="index.html" class="nav-item active"><i class="fas fa-home"></i><span>হোম</span></a>
        <a href="tasks.html" class="nav-item"><i class="fas fa-tasks"></i><span>টাস্ক</span></a>
        <a href="withdraw.html" class="nav-item"><i class="fas fa-wallet"></i><span>উইথড্র</span></a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user"></i><span>প্রোফাইল</span></a>
    </div>

    <script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script src="app.js"></script>
</body>
</html>
