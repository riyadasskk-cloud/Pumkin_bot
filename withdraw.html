<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>উইথড্র - মিষ্টি কুমড়া বট</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container mx-auto px-4 py-6">
        <div class="pumpkin-header mb-6">
            <h1 class="text-2xl font-bold">💰 টাকা উত্তোলন</h1>
            <p class="text-white/80">আপনার আয় নিন</p>
        </div>

        <div class="pumpkin-card text-center mb-6">
            <p class="text-gray-600">বর্তমান ব্যালেন্স</p>
            <h2 class="text-4xl font-bold text-green-600" id="balance">০ টাকা</h2>
        </div>

        <div class="pumpkin-card mb-6">
            <h3 class="font-bold mb-4">📋 উত্তোলনের শর্তাবলী</h3>
            <div class="space-y-3">
                <div class="flex justify-between items-center p-2 bg-gray-50 rounded"><span>ন্যূনতম উত্তোলন:</span><span class="font-bold text-green-600">৫০০ টাকা</span></div>
                <div class="flex justify-between items-center p-2 bg-gray-50 rounded"><span>👥 রেফারেল প্রয়োজন:</span><span id="reqReferrals" class="font-bold text-red-500">0/15</span></div>
                <div class="flex justify-between items-center p-2 bg-gray-50 rounded"><span>📺 মোট এড প্রয়োজন:</span><span id="reqAds" class="font-bold text-red-500">0/10</span></div>
            </div>
        </div>

        <div class="pumpkin-card">
            <h3 class="font-bold mb-4">📝 উত্তোলন ফর্ম</h3>
            <div class="space-y-4">
                <select id="method" class="w-full p-3 border rounded-xl">
                    <option value="bkash">bKash (বিকাশ)</option>
                    <option value="nagad">Nagad (নগদ)</option>
                    <option value="rocket">Rocket (রকেট)</option>
                </select>
                <input type="number" id="amount" placeholder="পরিমাণ (টাকা)" class="w-full p-3 border rounded-xl">
                <input type="tel" id="account" placeholder="মোবাইল নম্বর (01XXXXXXXXX)" class="w-full p-3 border rounded-xl">
                <button onclick="submitWithdraw()" id="withdrawBtn" class="pumpkin-btn bg-gradient-to-r from-green-500 to-green-600">💸 উত্তোলন করুন</button>
            </div>
        </div>

        <a href="index.html" class="block text-center text-gray-500 mt-6">← হোমে ফিরুন</a>
    </div>

    <div class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i><span>হোম</span></a>
        <a href="tasks.html" class="nav-item"><i class="fas fa-tasks"></i><span>টাস্ক</span></a>
        <a href="withdraw.html" class="nav-item active"><i class="fas fa-wallet"></i><span>উইথড্র</span></a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user"></i><span>প্রোফাইল</span></a>
    </div>

    <script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script src="app.js"></script>
    <script>
        async function submitWithdraw() {
            const user = await getCurrentUser();
            if (!user) return;
            
            const amount = parseFloat(document.getElementById('amount').value);
            const account = document.getElementById('account').value.trim();
            const method = document.getElementById('method').value;
            
            if (isNaN(amount) || amount < 500) { alert('⚠️ ন্যূনতম ৫০০ টাকা উত্তোলন করতে হবে!'); return; }
            if (amount > user.balance) { alert(`⚠️ আপনার ব্যালেন্স: ${user.balance} টাকা`); return; }
            if ((user.total_referrals || 0) < 15) { alert(`⚠️ রেফারেল প্রয়োজন: ${user.total_referrals || 0}/15 জন`); return; }
            if ((user.total_ads || 0) < 10) { alert(`⚠️ এড প্রয়োজন: ${user.total_ads || 0}/10 টি`); return; }
            if (!account.match(/^01[0-9]{9}$/)) { alert('⚠️ সঠিক মোবাইল নম্বর দিন (01XXXXXXXXX)'); return; }
            
            if (!confirm(`${amount} টাকা উত্তোলন করবেন?\n${method.toUpperCase()}: ${account}`)) return;
            
            const btn = document.getElementById('withdrawBtn');
            btn.disabled = true;
            btn.innerHTML = '⏳ প্রসেসিং...';
            
            const result = await requestWithdraw(amount, account, method);
            if (result.success) {
                alert('✅ উত্তোলন রিকোয়েস্ট সফল!\n২৪ ঘন্টার মধ্যে পেমেন্ট করা হবে।');
                location.reload();
            } else {
                alert('❌ ব্যর্থ: ' + result.error);
                btn.disabled = false;
                btn.innerHTML = '💸 উত্তোলন করুন';
            }
        }
    </script>
</body>
</html>
